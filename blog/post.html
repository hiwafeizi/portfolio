<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Hiwa Feizi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <style>
        .post-header {
            padding: 4rem 0 2rem;
        }

        .blog-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--ocean);
            text-decoration: none;
            margin-bottom: 1.5rem;
        }

        .blog-back:hover {
            color: var(--ink);
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .post-header h1 {
            font-size: 2.6rem;
            line-height: 1.15;
            margin-bottom: 1.5rem;
        }

        .post-cover {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 12px 30px rgba(11, 27, 36, 0.12);
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .post-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.3rem 0.7rem;
            border: 1px solid rgba(14, 86, 105, 0.18);
            background: rgba(20, 164, 166, 0.12);
            color: var(--ocean);
            font-size: 0.78rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s ease;
        }

        .post-tag:hover {
            background: var(--sun);
            border-color: rgba(244, 185, 66, 0.6);
            color: #2b1a00;
        }

        .post-content {
            background: var(--card);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid rgba(11, 27, 36, 0.08);
            box-shadow: 0 12px 30px rgba(11, 27, 36, 0.08);
            margin-bottom: 4rem;
        }

        .post-content h1 {
            display: none;
        }

        .post-content h2 {
            font-size: 1.8rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(11, 27, 36, 0.08);
        }

        .post-content h2:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        .post-content h3 {
            font-size: 1.3rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: var(--ocean);
        }

        .post-content p {
            font-size: 1.05rem;
            line-height: 1.75;
            color: var(--ink);
            margin-bottom: 1.2rem;
        }

        .post-content strong {
            color: var(--ink);
            font-weight: 700;
        }

        .post-content em {
            font-style: italic;
        }

        .post-content code {
            font-family: "DM Mono", "Fira Code", monospace;
            font-size: 0.88rem;
            background: rgba(14, 86, 105, 0.08);
            padding: 0.15rem 0.45rem;
            border-radius: 6px;
            color: var(--ocean);
        }

        .post-content pre {
            background: #07131a;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .post-content pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
        }

        .post-content ul, .post-content ol {
            margin: 1rem 0 1.5rem 1.5rem;
            color: var(--ink);
        }

        .post-content li {
            font-size: 1.05rem;
            line-height: 1.75;
            margin-bottom: 0.5rem;
        }

        .post-content blockquote {
            border-left: 4px solid var(--sun);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: rgba(244, 185, 66, 0.08);
            border-radius: 0 12px 12px 0;
        }

        .post-content blockquote p {
            color: var(--muted);
            font-style: italic;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 14px;
            margin: 1.5rem 0;
            box-shadow: 0 8px 24px rgba(11, 27, 36, 0.1);
        }

        .linkedin-embeds {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .linkedin-embeds iframe {
            width: 100%;
            max-width: 504px;
            justify-self: center;
            height: 713px;
            border: 0;
            border-radius: 14px;
            background: #f3f6f8;
        }

        .post-content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 1.5rem 0;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(11, 27, 36, 0.06);
            border: 1px solid rgba(11, 27, 36, 0.08);
        }

        .post-content thead th {
            background: var(--ink);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.9rem 1.2rem;
            text-align: left;
        }

        .post-content tbody td {
            padding: 0.75rem 1.2rem;
            font-size: 0.95rem;
            border-top: 1px solid rgba(11, 27, 36, 0.06);
        }

        .post-content tbody tr:nth-child(even) {
            background: rgba(20, 164, 166, 0.04);
        }

        .post-content tbody tr:hover {
            background: rgba(20, 164, 166, 0.08);
        }

        .post-content hr {
            border: none;
            border-top: 1px solid rgba(11, 27, 36, 0.08);
            margin: 2.5rem 0;
        }

        .post-loading {
            text-align: center;
            padding: 4rem 0;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .post-header h1 {
                font-size: 1.8rem;
            }

            .post-content {
                padding: 1.8rem;
                border-radius: 16px;
            }

            .post-content h2 {
                font-size: 1.4rem;
            }

            .post-content h3 {
                font-size: 1.15rem;
            }

            .post-content p, .post-content li {
                font-size: 0.95rem;
            }

            .post-cover {
                border-radius: 14px;
                max-height: 240px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <nav class="navbar">
        <div class="container">
            <div class="logo">Hiwa Feizi</div>
            <ul class="nav-links">
                <li><a href="../index.html">Portfolio</a></li>
                <li><a href="index.html" class="nav-cta">Blogs</a></li>
            </ul>
        </div>
    </nav>

    <header class="post-header">
        <div class="container">
            <a href="index.html" class="blog-back">&#8592; All posts</a>
            <div class="post-meta" id="post-meta"></div>
            <h1 id="post-title"></h1>
            <div class="post-tags" id="post-tags"></div>
        </div>
    </header>

    <main>
        <div class="container">
            <img class="post-cover" id="post-cover" style="display:none" alt="">
            <div class="post-content" id="post-content">
                <p class="post-loading">Loading...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Feel free to copy. Portfolio code: <a href="https://github.com/hiwafeizi/portfolio" target="_blank" rel="noreferrer">github.com/hiwafeizi/portfolio</a></p>
        </div>
    </footer>
</div><!-- .page-wrap -->

    <script>
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) {
                window.location.href = 'index.html';
                return;
            }

            const indexRes = await fetch('../blogs/blogs.json');
            const posts = await indexRes.json();
            const post = posts.find(p => p.slug === slug);

            if (!post) {
                document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
                return;
            }

            document.title = `${post.title} — Hiwa Feizi`;

            document.getElementById('post-title').textContent = post.title;

            const meta = document.getElementById('post-meta');
            const date = new Date(post.date).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
            meta.innerHTML = `<span>${date}</span><span>${post.readTime}</span>`;

            const tagsEl = document.getElementById('post-tags');
            post.tags.forEach(tag => {
                const a = document.createElement('a');
                a.className = 'post-tag';
                a.href = `index.html?tag=${encodeURIComponent(tag)}`;
                a.textContent = tag;
                tagsEl.appendChild(a);
            });

            if (post.cover) {
                const coverEl = document.getElementById('post-cover');
                coverEl.src = `../blogs/images/${post.cover}`;
                coverEl.alt = post.title;
                coverEl.style.display = 'block';
            }

            const mdRes = await fetch(`../blogs/posts/${slug}.md`);
            const md = await mdRes.text();

            const renderer = new marked.Renderer();
            const defaultImage = renderer.image.bind(renderer);
            renderer.image = function(href, title, text) {
                if (href && !href.startsWith('http') && !href.startsWith('/')) {
                    href = `../blogs/images/${href}`;
                }
                return defaultImage(href, title, text);
            };

            marked.setOptions({
                renderer: renderer,
                gfm: true,
                breaks: false
            });

            document.getElementById('post-content').innerHTML = marked.parse(md);
        }

        init();
    </script>
</body>
</html>
